<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf0ee"/>
      <stop offset="100%" style="stop-color:#f5ddd8"/>
    </linearGradient>
    <!-- Heatmap radial gradient inspired by block01 density plot -->
    <radialGradient id="heat" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#d32f2f;stop-opacity:0.12"/>
      <stop offset="30%" style="stop-color:#ff9800;stop-opacity:0.08"/>
      <stop offset="60%" style="stop-color:#ffeb3b;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#fdf0ee;stop-opacity:0"/>
    </radialGradient>
    <!-- Soft glow for map-inspired region -->
    <radialGradient id="mapglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#c0736a;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#c0736a;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="340" rx="8" fill="url(#bg2)"/>

  <!-- Heatmap glow (from block01 density center) -->
  <ellipse cx="145" cy="175" rx="110" ry="90" fill="url(#heat)"/>

  <!-- Abstract WA coastline contour (from block02 map) -->
  <path d="M480,30 C478,45 475,70 472,95 C470,110 468,130 465,148
           C462,165 455,185 448,200 C440,218 430,232 425,248
           C422,258 420,268 422,280 C424,292 430,300 438,308"
        stroke="#c0736a" stroke-width="1.2" fill="none" opacity="0.12"
        stroke-linecap="round"/>
  <path d="M495,28 C493,50 490,80 487,108 C484,130 480,155 476,175
           C472,195 465,215 458,230 C452,242 445,255 440,268
           C436,278 434,290 437,302"
        stroke="#c0736a" stroke-width="0.8" fill="none" opacity="0.08"
        stroke-linecap="round"/>

  <!-- Map-inspired scattered location dots (from block02 colored circles) -->
  <g opacity="0.5">
    <circle cx="58" cy="62" r="5" fill="#4caf50"/>
    <circle cx="42" cy="88" r="7" fill="#2196f3"/>
    <circle cx="72" cy="105" r="4" fill="#ff9800"/>
    <circle cx="30" cy="130" r="6" fill="#4caf50"/>
    <circle cx="55" cy="148" r="5" fill="#2196f3"/>
    <circle cx="38" cy="170" r="8" fill="#ff9800"/>
    <circle cx="65" cy="192" r="4" fill="#4caf50"/>
    <circle cx="48" cy="215" r="6" fill="#2196f3"/>
    <circle cx="28" cy="240" r="5" fill="#ff9800"/>
    <circle cx="70" cy="258" r="4" fill="#4caf50"/>
    <circle cx="52" cy="278" r="7" fill="#2196f3"/>
  </g>

  <!-- Scatter plot data points (from block01 density scatter) -->
  <g opacity="0.3">
    <circle cx="120" cy="105" r="2.5" fill="#7b1fa2"/>
    <circle cx="135" cy="125" r="2" fill="#7b1fa2"/>
    <circle cx="110" cy="140" r="2.8" fill="#7b1fa2"/>
    <circle cx="148" cy="118" r="1.8" fill="#7b1fa2"/>
    <circle cx="128" cy="155" r="2.2" fill="#7b1fa2"/>
    <circle cx="155" cy="145" r="2" fill="#9c27b0"/>
    <circle cx="165" cy="130" r="1.5" fill="#9c27b0"/>
    <circle cx="140" cy="168" r="2.5" fill="#7b1fa2"/>
    <circle cx="175" cy="152" r="1.8" fill="#9c27b0"/>
    <circle cx="108" cy="185" r="2" fill="#7b1fa2"/>
    <circle cx="130" cy="195" r="2.3" fill="#7b1fa2"/>
    <circle cx="160" cy="178" r="1.5" fill="#9c27b0"/>
    <circle cx="185" cy="140" r="1.8" fill="#9c27b0"/>
    <circle cx="145" cy="210" r="2" fill="#7b1fa2"/>
    <circle cx="118" cy="225" r="1.5" fill="#7b1fa2"/>
    <circle cx="190" cy="165" r="2" fill="#9c27b0"/>
    <circle cx="170" cy="200" r="1.8" fill="#9c27b0"/>
    <circle cx="200" cy="188" r="1.5" fill="#ce93d8"/>
  </g>

  <!-- Heatmap core dots (red-orange from density center) -->
  <g opacity="0.35">
    <circle cx="135" cy="160" r="3.5" fill="#e53935"/>
    <circle cx="145" cy="148" r="3" fill="#ff5722"/>
    <circle cx="128" cy="172" r="2.8" fill="#ff9800"/>
    <circle cx="152" cy="165" r="2.5" fill="#e53935"/>
    <circle cx="138" cy="180" r="3.2" fill="#ff5722"/>
    <circle cx="148" cy="175" r="2" fill="#ffeb3b"/>
  </g>

  <!-- Marginal return curve (from block01 panel b) -->
  <path d="M100,260 C120,230 150,218 180,215 C210,212 250,210 290,208
           C330,206 370,205 410,206 C440,207 460,210 480,215"
        stroke="#c0736a" stroke-width="1.8" fill="none" opacity="0.15"
        stroke-linecap="round"/>
  <!-- Confidence band -->
  <path d="M100,252 C120,224 150,213 180,210 C210,207 250,205 290,204
           C330,202 370,201 410,202 C440,203 460,206 480,210
           L480,220 C460,214 440,211 410,210 C370,209 330,210 290,212
           C250,215 210,217 180,220 C150,223 120,236 100,268 Z"
        fill="#c0736a" opacity="0.05"/>

  <!-- Utility curve (thin blue, from block01 panel b) -->
  <path d="M100,285 C130,255 150,275 170,290 C190,300 220,305 260,308
           C300,310 340,310 380,310 C420,310 460,312 500,314"
        stroke="#5c6bc0" stroke-width="1" fill="none" opacity="0.12"
        stroke-linecap="round" stroke-dasharray="4,3"/>

  <!-- Axis lines (subtle, inspired by plot axes) -->
  <line x1="95" y1="85" x2="95" y2="300" stroke="#c0736a" stroke-width="0.6" opacity="0.08"/>
  <line x1="95" y1="300" x2="210" y2="300" stroke="#c0736a" stroke-width="0.6" opacity="0.08"/>

  <!-- Grid ticks -->
  <g stroke="#c0736a" stroke-width="0.4" opacity="0.06">
    <line x1="92" y1="130" x2="210" y2="130"/>
    <line x1="92" y1="175" x2="210" y2="175"/>
    <line x1="92" y1="220" x2="210" y2="220"/>
    <line x1="92" y1="265" x2="210" y2="265"/>
    <line x1="135" y1="85" x2="135" y2="300"/>
    <line x1="175" y1="85" x2="175" y2="300"/>
  </g>

  <!-- Rising bar chart (refined, lower-right) -->
  <g fill="#c0736a" opacity="0.08">
    <rect x="330" y="258" width="22" height="42" rx="3"/>
    <rect x="360" y="242" width="22" height="58" rx="3"/>
    <rect x="390" y="225" width="22" height="75" rx="3"/>
    <rect x="420" y="210" width="22" height="90" rx="3"/>
    <rect x="450" y="218" width="22" height="82" rx="3"/>
    <rect x="480" y="198" width="22" height="102" rx="3"/>
    <rect x="510" y="205" width="22" height="95" rx="3"/>
    <rect x="540" y="190" width="22" height="110" rx="3"/>
  </g>

  <!-- Trend arrow -->
  <polyline points="341,252 371,236 401,219 431,204 461,212 491,192 521,199 551,184"
            stroke="#c0736a" stroke-width="1.5" fill="none" opacity="0.12"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Decorative soft circles (background depth) -->
  <circle cx="500" cy="70" r="80" fill="#c0736a" opacity="0.03"/>
  <circle cx="300" cy="320" r="60" fill="#c0736a" opacity="0.03"/>
  <ellipse cx="420" cy="100" rx="30" ry="30" fill="url(#mapglow)"/>

  <!-- Text -->
  <text x="300" y="155" text-anchor="middle" fill="#8a3a30" font-family="Georgia,serif" font-size="34" font-weight="700">Recent High Impact</text>
  <text x="300" y="195" text-anchor="middle" fill="#8a3a30" font-family="Georgia,serif" font-size="34" font-weight="700">Articles</text>
</svg>
